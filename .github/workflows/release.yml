name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Build .mcaddon
        run: uv run packs/build.py
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: "*.mcaddon"
          generate_release_notes: true
